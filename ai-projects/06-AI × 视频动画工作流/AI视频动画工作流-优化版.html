  <!-- 核心样式 -->
  <style>
    /* ===== 基础 ===== */
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
      background-color: #000;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }
    code, .font-mono {
      font-family: "SF Mono", SFMono-Regular, ui-monospace, Menlo, Monaco, monospace;
    }
    ::selection { background: #ff9ac8; color: #000; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* ===== 导航栏 ===== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5rem 3rem; font-size: 0.8125rem; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      background-color: transparent; backdrop-filter: blur(0px);
      border-bottom: 1px solid transparent;
      transition: background-color 0.4s, backdrop-filter 0.4s, border-color 0.4s, padding 0.4s;
    }
    .header.is-scrolled {
      padding-top: 1rem; padding-bottom: 1rem;
      background-color: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
      border-bottom-color: rgba(255,255,255,0.06);
    }
    .header-logo {
      flex: 1; color: rgba(255,255,255,0.55); text-decoration: none;
      display: flex; align-items: center; gap: 0.5rem; font-size: 0.8125rem;
      font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      transition: color 0.3s;
    }
    .header-logo:hover { color: #fff; }
    .header-right { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 0.75rem; }
    .header-social {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      color: rgba(255,255,255,0.55); text-decoration: none; font-size: 0.8125rem;
      font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.3s;
    }
    .header-social:hover { color: #fff; }
    @media (max-width: 768px) {
      .header { padding: 1rem 1.5rem; }
      .header.is-scrolled { padding-top: 0.75rem; padding-bottom: 0.75rem; }
    }

    /* ===== 全局视觉层 ===== */
    .vignette {
      position: fixed; inset: 0; z-index: 9996; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.35) 100%);
    }
    .glow-blob {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      filter: blur(120px); will-change: transform;
    }
    .glow-blob-1 { width: 600px; height: 600px; top: -15%; right: -10%;
      background: radial-gradient(circle, rgba(226,242,31,0.38), transparent 70%);
      animation: blobFloat1 20s ease-in-out infinite;
    }
    .glow-blob-2 { width: 500px; height: 500px; bottom: 5%; left: -8%;
      background: radial-gradient(circle, rgba(226,242,31,0.30), transparent 70%);
      animation: blobFloat2 24s ease-in-out infinite;
    }
    @keyframes blobFloat1 {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(-50px,80px) scale(1.1); }
      66% { transform: translate(40px,-40px) scale(0.95); }
    }
    @keyframes blobFloat2 {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(60px,-50px) scale(1.15); }
      66% { transform: translate(-30px,40px) scale(0.9); }
    }
    .spotlight-layer { position: fixed; inset: 0; z-index: 9997; pointer-events: none;
      background: radial-gradient(180px circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(255,255,255,0.035), transparent 70%);
    }

    /* ===== 卡片光晕 ===== */
    .card-glow { position: relative; overflow: hidden;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      border: 1px solid rgba(255,255,255,0.08) !important;
      transition: border-color 0.6s cubic-bezier(0.22,1,0.36,1),
                  box-shadow 0.6s cubic-bezier(0.22,1,0.36,1),
                  background-color 0.6s cubic-bezier(0.22,1,0.36,1);
    }
    .card-glow::before {
      content: ""; position: absolute; inset: 0; border-radius: inherit; z-index: 0; opacity: 0;
      background:
        radial-gradient(100px circle at var(--card-x,50%) var(--card-y,50%), rgba(255,255,255,0.04), transparent),
        radial-gradient(280px circle at var(--card-x,50%) var(--card-y,50%), rgba(255,255,255,0.02), transparent 50%);
      transition: opacity 0.5s cubic-bezier(0.22,1,0.36,1);
      pointer-events: none;
    }
    .card-glow:hover::before { opacity: 1; }
    .card-glow:hover {
      border-color: rgba(226,242,31,0.55);
      background-color: rgba(255,255,255,0.14);
      box-shadow: 0 0 40px rgba(255,255,255,0.04), inset 0 0 0 1px rgba(255,255,255,0.06);
    }
    .card-glow > * { position: relative; z-index: 1; }

    /* ===== 内容卡片（工作流步骤） ===== */
    .content-card { padding: 1.5rem; border-radius: 18px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    .content-card:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(226,242,31,0.2);
      transform: translateY(-2px);
    }

    /* ===== 视频卡片 ===== */
    .video-card {
      background: rgba(255,255,255,0.02); border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.3s;
    }
    .video-card:hover { background: rgba(255,255,255,0.04); border-color: rgba(226,242,31,0.2); }
    .video-wrapper { border-radius: 12px; overflow: hidden; }
    .video-wrapper video { width: 100%; height: auto; display: block; }
    .video-card-title { padding: 0.75rem 1rem; font-size: 0.75rem; color: rgba(255,255,255,0.5); letter-spacing: 0.02em; }

    /* ===== 章节标题左侧色条 ===== */
    section h2 { position: relative; padding-left: 0.85rem; }
    section h2::before { content: ""; position: absolute; left: 0; top: 0.3em; bottom: 0.3em;
      width: 2.5px; background: #e2f21f; border-radius: 2px; opacity: 0.7;
    }

    /* ===== 数据卡片 ===== */
    .stat-card { text-align: center; padding: 1.5rem; border-radius: 16px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      transition: all 0.3s;
    }
    .stat-card:hover { background: rgba(255,255,255,0.04); border-color: rgba(226,242,31,0.2); }
    .stat-value { font-size: 2.5rem; font-weight: 700; color: #e2f21f; line-height: 1; }
    .stat-label { margin-top: 0.5rem; font-size: 0.8rem; color: rgba(255,255,255,0.5); }

    /* ===== 滚动渐显 ===== */
    .scroll-reveal { opacity: 0; transform: translateY(30px); }

    /* ===== 图片相关 ===== */
    .case-img { width: 100%; height: auto; object-fit: cover; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06); transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: zoom-in;
    }
    .case-img:hover { transform: scale(1.02); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

    .img-lightbox {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-out; opacity: 0;
      transition: opacity 0.3s ease;
    }
    .img-lightbox.active { opacity: 1; }
    .img-lightbox img {
      max-width: 90vw; max-height: 90vh;
      object-fit: contain; border-radius: 8px;
      cursor: zoom-out;
    }
    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: #fff; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.25s; z-index: 2; padding: 0;
    }
    .lightbox-nav:hover { background: rgba(226,242,31,0.15); border-color: rgba(226,242,31,0.4); }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }
    @media (min-width: 768px) {
      .lightbox-prev { left: 32px; }
      .lightbox-next { right: 32px; }
    }
    .lightbox-counter {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.35); font-size: 0.8rem; z-index: 2; letter-spacing: 0.05em;
    }

    @keyframes ripple-out {
      0% { transform: scale(0.35); opacity: 0.7; }
      100% { transform: scale(2.20); opacity: 0.0; }
    }

    /* ===== 工具矩阵 ===== */
    .tool-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px;
      padding: 20px 12px;
      border-radius: 14px;
      transition: background 0.3s;
    }
    .tool-card:hover {
      background: rgba(255,255,255,0.03);
    }
    .tool-matrix-img {
      width: 78px; height: 78px;
      object-fit: contain;
      border-radius: 10px;
      transition: transform 0.3s ease;
      display: block;
      margin: 0 auto;
    }
    .tool-card:hover .tool-matrix-img {
      transform: scale(1.12);
    }
    .tool-icon {
      width: 78px; height: 78px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem; font-weight: 700;
      color: #fff;
      transition: transform 0.3s ease;
    }
    .tool-card:hover .tool-icon {
      transform: scale(1.12);
    }
  </style>
</head>

  <!-- ============================================================ -->
  <!-- ===================== 交互逻辑 ===================== -->
  <!-- ============================================================ -->
  <script>
    // 导航栏滚动变色
    window.addEventListener('scroll', () => {
      document.getElementById('header').classList.toggle('is-scrolled', window.scrollY > 20);
    });

    // 鼠标位置追踪（spotlight + card glow）
    document.addEventListener('mousemove', (e) => {
      document.body.style.setProperty('--mouse-x', e.clientX + 'px');
      document.body.style.setProperty('--mouse-y', e.clientY + 'px');
    });

    // 卡片内鼠标位置（光晕跟随）
    document.querySelectorAll('.card-glow').forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        card.style.setProperty('--card-x', (e.clientX - rect.left) + 'px');
        card.style.setProperty('--card-y', (e.clientY - rect.top) + 'px');
      });
    });

    // GSAP 滚动动画
    gsap.registerPlugin(ScrollTrigger);
    gsap.utils.toArray('.scroll-reveal').forEach(el => {
      gsap.to(el, {
        opacity: 1, y: 0, duration: 0.8, ease: 'power3.out',
        scrollTrigger: { trigger: el, start: 'top 85%', toggleActions: 'play none none none' }
      });
    });

    // 数字滚动动画
    gsap.utils.toArray('.stat-number').forEach(el => {
      gsap.from(el, {
        textContent: 0, duration: 1.5, ease: 'power2.out', snap: { textContent: 1 },
        scrollTrigger: { trigger: el, start: 'top 85%' }
      });
    });

    // 图片点击放大 + 左右切换
    const caseImgs = Array.from(document.querySelectorAll('.case-img'));
    caseImgs.forEach((img, idx) => {
      img.addEventListener('click', () => openLightbox(idx));
    });

    function openLightbox(startIdx) {
      let currentIdx = startIdx;
      const overlay = document.createElement('div');
      overlay.className = 'img-lightbox';

      const imgEl = document.createElement('img');
      imgEl.src = caseImgs[currentIdx].src;
      imgEl.alt = caseImgs[currentIdx].alt;

      const prevBtn = document.createElement('button');
      prevBtn.className = 'lightbox-nav lightbox-prev';
      prevBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>';
      prevBtn.setAttribute('aria-label', '上一张');

      const nextBtn = document.createElement('button');
      nextBtn.className = 'lightbox-nav lightbox-next';
      nextBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>';
      nextBtn.setAttribute('aria-label', '下一张');

      const counter = document.createElement('div');
      counter.className = 'lightbox-counter';
      counter.textContent = (currentIdx + 1) + ' / ' + caseImgs.length;

      function updateImg() {
        imgEl.src = caseImgs[currentIdx].src;
        imgEl.alt = caseImgs[currentIdx].alt;
        counter.textContent = (currentIdx + 1) + ' / ' + caseImgs.length;
      }

      prevBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        currentIdx = (currentIdx - 1 + caseImgs.length) % caseImgs.length;
        updateImg();
      });
      nextBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        currentIdx = (currentIdx + 1) % caseImgs.length;
        updateImg();
      });

      overlay.appendChild(imgEl);
      overlay.appendChild(prevBtn);
      overlay.appendChild(nextBtn);
      overlay.appendChild(counter);
      document.body.appendChild(overlay);
      requestAnimationFrame(() => overlay.classList.add('active'));

      const close = () => {
        overlay.classList.remove('active');
        setTimeout(() => overlay.remove(), 300);
        document.removeEventListener('keydown', onKey);
      };

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay || e.target === imgEl) close();
      });

      function onKey(e) {
        if (e.key === 'Escape') close();
        if (e.key === 'ArrowLeft') prevBtn.click();
        if (e.key === 'ArrowRight') nextBtn.click();
      }
      document.addEventListener('keydown', onKey);
    }

    const initSmoothScroll = () => {
      if (!window.Lenis || !window.matchMedia("(pointer: fine)").matches) return null;
      const lenis = new Lenis({ lerp: 0.075, wheelMultiplier: 0.85, touchMultiplier: 1, smoothWheel: true });
      gsap.ticker.add((time) => { lenis.raf(time * 1000); });
      gsap.ticker.lagSmoothing(0);
      return lenis;
    };
    initSmoothScroll();
  </script>
