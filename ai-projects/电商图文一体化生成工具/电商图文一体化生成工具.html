    .vignette { position: fixed; inset: 0; z-index: 9996; pointer-events: none; background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.35) 100%); }

    @keyframes blobFloat1 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(-50px,80px) scale(1.1); } 66% { transform: translate(40px,-40px) scale(0.95); } }
    @keyframes blobFloat2 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(60px,-50px) scale(1.15); } 66% { transform: translate(-30px,40px) scale(0.9); } }

    .spotlight-layer { position: fixed; inset: 0; z-index: 9997; pointer-events: none; background: radial-gradient(180px circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(255,255,255,0.035), transparent 70%); }

    .card-glow { position: relative; overflow: hidden; background: rgba(255,255,255,0.08); backdrop-filter: blur(18px) saturate(150%); -webkit-backdrop-filter: blur(18px) saturate(150%); border: 1px solid rgba(255,255,255,0.08) !important; transition: border-color 0.6s cubic-bezier(0.22,1,0.36,1), box-shadow 0.6s cubic-bezier(0.22,1,0.36,1), background-color 0.6s cubic-bezier(0.22,1,0.36,1); }
    .card-glow::before { content: ""; position: absolute; inset: 0; border-radius: inherit; z-index: 0; opacity: 0; background: radial-gradient(100px circle at var(--card-x,50%) var(--card-y,50%), rgba(255,255,255,0.04), transparent), radial-gradient(280px circle at var(--card-x,50%) var(--card-y,50%), rgba(255,255,255,0.02), transparent 50%); transition: opacity 0.5s cubic-bezier(0.22,1,0.36,1); pointer-events: none; }
    .card-glow:hover::before { opacity: 1; }
    .card-glow:hover { border-color: rgba(226,242,31,0.55); background-color: rgba(255,255,255,0.14); box-shadow: 0 0 40px rgba(255,255,255,0.04), inset 0 0 0 1px rgba(255,255,255,0.06); }

    .stat-card { text-align: center; padding: 1.5rem; border-radius: 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(18px) saturate(150%); -webkit-backdrop-filter: blur(18px) saturate(150%); transition: all 0.3s; }

    .stat-label { margin-top: 0.5rem; font-size: 0.8rem; color: rgba(255,255,255,0.5); }

    .scroll-reveal { opacity: 0; transform: translateY(30px); }

    .case-img { width: 100%; height: auto; object-fit: cover; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: zoom-in; }
    .case-img:hover { transform: scale(1.02); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

    .img-lightbox { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; cursor: zoom-out; opacity: 0; transition: opacity 0.3s ease; }
    .img-lightbox.active { opacity: 1; }
    .img-lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; cursor: zoom-out; }
    .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.25s; z-index: 2; padding: 0; }

    @media (min-width: 768px) { .lightbox-prev { left: 32px; } .lightbox-next { right: 32px; } }
    .lightbox-counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.35); font-size: 0.8rem; z-index: 2; letter-spacing: 0.05em; }

    .content-card { padding: 1.5rem; border-radius: 18px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); }
    .tool-card { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px 12px; border-radius: 14px; transition: background 0.3s; }
    .tool-card:hover { background: rgba(255,255,255,0.03); }

    .tool-card:hover .tool-matrix-img { transform: scale(1.12); }

  <script>
    // ---------- 导航 ----------
    document.getElementById('nav-logo').href = CONFIG.nav.logoLink;
    document.getElementById('nav-logo-text').textContent = CONFIG.nav.logoText;
    const navLinksEl = document.getElementById('nav-links');
    CONFIG.nav.links.forEach(link => {
      const a = document.createElement('a');
      a.href = link.href;
      a.className = 'header-social';
      a.innerHTML = `<span>${link.text}</span>`;
      navLinksEl.appendChild(a);
    });

    // ---------- Hero ----------
    document.getElementById('hero-meta').textContent = CONFIG.hero.meta;
    document.getElementById('hero-tag').textContent = CONFIG.hero.tag;
    document.getElementById('hero-title').innerHTML =
      `${CONFIG.hero.title.line1}<br><span class="text-white/75">${CONFIG.hero.title.prefix}</span> <span style="color:#e2f21f;">${CONFIG.hero.title.highlight}</span>`;
    document.getElementById('hero-desc').innerHTML = CONFIG.hero.description;
    const heroLabelsEl = document.getElementById('hero-labels');
    CONFIG.hero.labels.forEach(label => {
      const span = document.createElement('span');
      span.className = 'card-glow inline-flex items-center gap-2 px-4 py-2 rounded-[22px] border border-white/[0.08] text-[0.8125rem] text-white/50';
      span.innerHTML = `<span class="w-1.5 h-1.5 rounded-full" style="background:#e2f21f;"></span>${label}`;
      heroLabelsEl.appendChild(span);
    });

    // ---------- Pain Points ----------
    document.getElementById('pain-points-title').textContent = CONFIG.painPoints.title;
    document.getElementById('pain-points-desc').textContent = CONFIG.painPoints.description;
    const painPointsGrid = document.getElementById('pain-points-grid');
    CONFIG.painPoints.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'content-card';
      div.innerHTML = `
        <h4 class="text-[0.95rem] font-semibold text-white mb-2">${item.title}</h4>
        <p class="text-[0.8rem] text-white/50 leading-[1.7]">${item.desc}</p>
      `;
      painPointsGrid.appendChild(div);
    });

    // ---------- Process ----------
    document.getElementById('process-title').textContent = CONFIG.process.title;
    document.getElementById('process-desc').textContent = CONFIG.process.description;
    const processGrid = document.getElementById('process-grid');
    CONFIG.process.steps.forEach(step => {
      const div = document.createElement('div');
      div.className = 'content-card';
      div.innerHTML = `
        <div class="text-[0.7rem] font-mono mb-3" style="color:#e2f21f;">STEP ${step.number}</div>
        <h4 class="text-[0.95rem] font-semibold text-white mb-2">${step.title}</h4>
        <p class="text-[0.8rem] text-white/50 leading-[1.7]">${step.desc}</p>
      `;
      processGrid.appendChild(div);
    });

    // ---------- Gallery ----------
    document.getElementById('gallery-title').textContent = CONFIG.gallery.title;
    document.getElementById('gallery-desc').textContent = CONFIG.gallery.description;
    const galleryGrid = document.getElementById('gallery-grid');
    CONFIG.gallery.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'text-center';
      div.innerHTML = `
        <div class="text-[0.65rem] font-medium text-white/30 uppercase tracking-wider mb-2">${item.title}</div>
        <img loading="lazy" src="${item.src}" alt="${item.alt}" class="case-img">
      `;
      galleryGrid.appendChild(div);
    });

    // ---------- Stats ----------
    document.getElementById('stats-title').textContent = CONFIG.stats.title;
    document.getElementById('stats-desc').textContent = CONFIG.stats.description;
    const statsGrid = document.getElementById('stats-grid');
    CONFIG.stats.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'stat-card';
      div.innerHTML = `
        <div class="stat-value"><span class="stat-number">${item.value}</span>${item.suffix}</div>
        <div class="stat-label">
          <span style="color:#e2f21f;font-weight:500;">${item.label}</span><br>
          ${item.desc}
        </div>
      `;
      statsGrid.appendChild(div);
    });

    // ---------- Quote ----------
    document.getElementById('quote-text').textContent = CONFIG.quote.text;
    document.getElementById('quote-source').textContent = CONFIG.quote.source;

    // ---------- Built with ----------
    document.getElementById('built-with').innerHTML =
      '<span>Built with Next.js</span><span>·</span><span>Electron</span><span>·</span><span>Prisma + SQLite</span><span>·</span><span>OpenAI Compatible API</span><span>·</span><span>Claude Code</span>';
  </script>


  <!-- ============================================================ -->
  <!-- ===================== 交互逻辑（不用改） ===================== -->
  <!-- ============================================================ -->
  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('header').classList.toggle('is-scrolled', window.scrollY > 20);
    });
    document.addEventListener('mousemove', (e) => {
      document.body.style.setProperty('--mouse-x', e.clientX + 'px');
      document.body.style.setProperty('--mouse-y', e.clientY + 'px');
    });
    document.querySelectorAll('.card-glow').forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        card.style.setProperty('--card-x', (e.clientX - rect.left) + 'px');
        card.style.setProperty('--card-y', (e.clientY - rect.top) + 'px');
      });
    });

    gsap.registerPlugin(ScrollTrigger);
    gsap.utils.toArray('.scroll-reveal').forEach(el => {
      gsap.to(el, { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out',
        scrollTrigger: { trigger: el, start: 'top 85%', toggleActions: 'play none none none' }
      });
    });
    gsap.utils.toArray('.stat-number').forEach(el => {
      gsap.from(el, { textContent: 0, duration: 1.5, ease: 'power2.out', snap: { textContent: 1 },
        scrollTrigger: { trigger: el, start: 'top 85%' }
      });
    });

    // 图片灯箱（← → 键盘 + 计数器）
    const caseImgs = Array.from(document.querySelectorAll('.case-img'));
    caseImgs.forEach((img, idx) => { img.addEventListener('click', () => openLightbox(idx)); });
    function openLightbox(startIdx) {
      let currentIdx = startIdx;
      const overlay = document.createElement('div'); overlay.className = 'img-lightbox';
      const imgEl = document.createElement('img'); imgEl.src = caseImgs[currentIdx].src; imgEl.alt = caseImgs[currentIdx].alt;
      const prevBtn = document.createElement('button'); prevBtn.className = 'lightbox-nav lightbox-prev'; prevBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>';
      const nextBtn = document.createElement('button'); nextBtn.className = 'lightbox-nav lightbox-next'; nextBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>';
      const counter = document.createElement('div'); counter.className = 'lightbox-counter'; counter.textContent = (currentIdx + 1) + ' / ' + caseImgs.length;
      function updateImg() { imgEl.src = caseImgs[currentIdx].src; imgEl.alt = caseImgs[currentIdx].alt; counter.textContent = (currentIdx + 1) + ' / ' + caseImgs.length; }
      prevBtn.addEventListener('click', (e) => { e.stopPropagation(); currentIdx = (currentIdx - 1 + caseImgs.length) % caseImgs.length; updateImg(); });
      nextBtn.addEventListener('click', (e) => { e.stopPropagation(); currentIdx = (currentIdx + 1) % caseImgs.length; updateImg(); });
      overlay.appendChild(imgEl); overlay.appendChild(prevBtn); overlay.appendChild(nextBtn); overlay.appendChild(counter);
      document.body.appendChild(overlay); requestAnimationFrame(() => overlay.classList.add('active'));
      const close = () => { overlay.classList.remove('active'); setTimeout(() => overlay.remove(), 300); document.removeEventListener('keydown', onKey); };
      overlay.addEventListener('click', (e) => { if (e.target === overlay || e.target === imgEl) close(); });
      function onKey(e) { if (e.key === 'Escape') close(); if (e.key === 'ArrowLeft') prevBtn.click(); if (e.key === 'ArrowRight') nextBtn.click(); }
      document.addEventListener('keydown', onKey);
    }

    const initSmoothScroll = () => {
      if (!window.Lenis || !window.matchMedia("(pointer: fine)").matches) return null;
      const lenis = new Lenis({ lerp: 0.075, wheelMultiplier: 0.85, touchMultiplier: 1, smoothWheel: true });
      gsap.ticker.add((time) => { lenis.raf(time * 1000); });
      gsap.ticker.lagSmoothing(0);
      return lenis;
    };
    initSmoothScroll();
  </script>

</body>
